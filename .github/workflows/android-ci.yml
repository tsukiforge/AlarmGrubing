name: Android Security and Build CI/CD

on:
  push:
    branches: [ "main", "main-*", "master" ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: write

jobs:
  # 1. Security Scan & Secret Leak Detection
  security_scan:
    name: Security & Secret Scan 🔐
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks Secret Detector
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Semgrep Static Application Security Testing (SAST)
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/kotlin
            p/secrets
        continue-on-error: true

  # 2. Static Analysis & Code Quality Rules
  lint_and_test:
    name: Lint & Unit Unit Test ⚙️
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Reconstruct Debug Keystore
        run: |
          if [ -f debug.keystore.base64 ]; then
            base64 -d debug.keystore.base64 > debug.keystore
          else
            echo "Warning: debug.keystore.base64 not found!"
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: false

      - name: Initialize Environment Variables
        run: |
          if [ -f .env.example ]; then
            cp .env.example .env
          else
            touch .env
          fi
          echo "BUILD_ENV=ci" >> .env

      - name: Run Android Lint (Security & Rules)
        run: gradle :app:lintDebug --continue
        continue-on-error: true

      - name: Run Local Unit & Robolectric Tests
        run: gradle :app:testDebugUnitTest --continue
        continue-on-error: true

      - name: Upload HTML Lint Report
        uses: actions/upload-artifact@v4
        with:
          name: android-lint-report
          path: app/build/reports/lint-results-debug.html
          if-no-files-found: ignore

  # 3. Android APK Compilation & Assembly
  build_apk:
    name: Build Android APK 📱
    needs: [security_scan, lint_and_test]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Reconstruct Debug Keystore
        run: |
          if [ -f debug.keystore.base64 ]; then
            base64 -d debug.keystore.base64 > debug.keystore
          else
            echo "Warning: debug.keystore.base64 not found!"
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: false

      - name: Initialize Environment Variables
        run: |
          if [ -f .env.example ]; then
            cp .env.example .env
          else
            touch .env
          fi
          echo "BUILD_ENV=ci" >> .env

      # ✅ FIX #1 — Konversi PNG yang corrupt sebelum build
      # File WebP/JPEG yang di-rename jadi .png akan ditolak AAPT2
      - name: Fix Corrupt PNG Assets
        run: |
          sudo apt-get install -y imagemagick 2>/dev/null
          DRAWABLE_DIR="app/src/main/res/drawable"
          if [ -d "$DRAWABLE_DIR" ]; then
            for f in "$DRAWABLE_DIR"/*.png; do
              if [ -f "$f" ]; then
                FILETYPE=$(file --mime-type -b "$f")
                if [ "$FILETYPE" != "image/png" ]; then
                  echo "⚠️  Fixing non-PNG file: $f (detected: $FILETYPE)"
                  convert "$f" /tmp/fixed.png && mv /tmp/fixed.png "$f"
                  echo "✅ Fixed: $f"
                fi
              fi
            done
          fi
          echo "PNG asset check complete."

      - name: Assemble Debug APK
        run: gradle :app:assembleDebug
        env:
          VERSION_CODE: ${{ github.run_number }}
          VERSION_NAME: 1.0.${{ github.run_number }}

      # ✅ FIX #2 — Keystore di-decode ke app/ folder (bukan root)
      # Sebelumnya: base64 -di > my-upload-key.jks  (salah: di root, -di tidak valid di Ubuntu)
      # Sekarang:   base64 -d  > app/my-upload-key.jks (benar: di app/ folder, flag -d saja)
      - name: Reconstruct Release Keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        if: ${{ env.RELEASE_KEYSTORE_BASE64 != '' }}
        run: |
          echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > app/my-upload-key.jks
          echo "✅ Keystore decoded to: app/my-upload-key.jks"

      # ✅ FIX #3 — KEYSTORE_PATH sekarang relatif ke app/ folder
      - name: Assemble Release APK
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          VERSION_CODE: ${{ github.run_number }}
          VERSION_NAME: 1.0.${{ github.run_number }}
          KEYSTORE_PATH: my-upload-key.jks
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        if: ${{ env.RELEASE_KEYSTORE_BASE64 != '' }}
        run: gradle :app:assembleRelease

      - name: Upload Built APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: alarmgrup-android-apk
          path: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/release/app-release.apk
          if-no-files-found: warn

      - name: Create GitHub Release and Upload APK
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/heads/main-'))
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="v1.0.${{ github.run_number }}"
          RELEASE_TITLE="Update Version v1.0.${{ github.run_number }}"
          
          APK_PATH="app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "app/build/outputs/apk/release/app-release.apk" ]; then
            APK_PATH="app/build/outputs/apk/release/app-release.apk"
            echo "Found production Release APK! Attaching it to Github Release."
          else
            echo "Release APK not compiled. Attaching Debug APK to Github Release."
          fi
          
          echo "Creating Release $RELEASE_TITLE with tag $TAG_NAME..."
          
          gh release create "$TAG_NAME" \
            "$APK_PATH" \
            --title "$RELEASE_TITLE" \
            --notes "Automated release of Alarm Grup version 1.0.${{ github.run_number }} (code: ${{ github.run_number }}). Safety and security verification passed successfully on commit ${{ github.sha }}." \
            --target ${{ github.sha }}