name: Android Security and Build CI/CD

on:
  push:
    branches: [ "main", "main-*", "master" ]
    paths:
      - 'app/**'
      - 'gradle/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - '.github/workflows/android-ci.yml'
  pull_request:
    branches: [ "main", "master" ]
    paths:
      - 'app/**'
      - 'gradle/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - '.github/workflows/android-ci.yml'

# ✅ FIX Node.js 24: tambahkan env global ini
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  # 1. Security Scan & Secret Leak Detection
  security_scan:
    name: Security & Secret Scan 🔐
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4.2.2       # ✅ Node 24 compatible
        with:
          fetch-depth: 0

      - name: Gitleaks Secret Detector
        uses: gitleaks/gitleaks-action@v2.3.9  # ✅ Node 24 compatible
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Semgrep SAST
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/kotlin
            p/secrets
        continue-on-error: true

  # 2. Static Analysis & Code Quality Rules
  lint_and_test:
    name: Lint & Unit Test ⚙️
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4.2.2       # ✅ Node 24 compatible

      - name: Reconstruct Debug Keystore
        run: |
          if [ -f debug.keystore.base64 ]; then
            base64 -d debug.keystore.base64 > debug.keystore
          else
            echo "Warning: debug.keystore.base64 not found!"
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4.7.1     # ✅ Node 24 compatible
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4  # ✅ Node 24 compatible
        with:
          cache-read-only: false

      - name: Initialize Environment Variables
        run: |
          if [ -f .env.example ]; then
            cp .env.example .env
          else
            touch .env
          fi
          echo "BUILD_ENV=ci" >> .env

      - name: Run Android Lint
        run: gradle :app:lintDebug --continue
        continue-on-error: true

      - name: Run Unit Tests
        run: gradle :app:testDebugUnitTest --continue
        continue-on-error: true

      - name: Upload Lint Report
        uses: actions/upload-artifact@v4.6.2  # ✅ Node 24 compatible
        with:
          name: android-lint-report
          path: app/build/reports/lint-results-debug.html
          if-no-files-found: ignore

  # 3. Android APK Compilation & Assembly
  build_apk:
    name: Build Android APK 📱
    needs: [security_scan, lint_and_test]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4.2.2       # ✅ Node 24 compatible

      - name: Reconstruct Debug Keystore
        run: |
          if [ -f debug.keystore.base64 ]; then
            base64 -d debug.keystore.base64 > debug.keystore
          else
            echo "Warning: debug.keystore.base64 not found!"
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4.7.1     # ✅ Node 24 compatible
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4  # ✅ Node 24 compatible
        with:
          cache-read-only: false

      - name: Initialize Environment Variables
        run: |
          if [ -f .env.example ]; then
            cp .env.example .env
          else
            touch .env
          fi
          echo "BUILD_ENV=ci" >> .env

      # ✅ FIX PNG — konversi file PNG corrupt sebelum build
      - name: Fix Corrupt PNG Assets
        run: |
          sudo apt-get install -y imagemagick 2>/dev/null
          DRAWABLE_DIR="app/src/main/res/drawable"
          if [ -d "$DRAWABLE_DIR" ]; then
            for f in "$DRAWABLE_DIR"/*.png; do
              if [ -f "$f" ]; then
                FILETYPE=$(file --mime-type -b "$f")
                if [ "$FILETYPE" != "image/png" ]; then
                  echo "⚠️  Fixing: $f (detected: $FILETYPE)"
                  convert "$f" /tmp/fixed.png && mv /tmp/fixed.png "$f"
                  echo "✅ Fixed: $f"
                fi
              fi
            done
          fi
          echo "PNG check complete."

      # ✅ FIX KEYSTORE — decode ke app/ folder (bukan root)
      - name: Reconstruct Release Keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        if: ${{ env.RELEASE_KEYSTORE_BASE64 != '' }}
        run: |
          echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > app/my-upload-key.jks
          echo "✅ Keystore: app/my-upload-key.jks"

      - name: Assemble Release APK
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          VERSION_CODE: ${{ github.run_number }}
          VERSION_NAME: 5.2.${{ github.run_number }}
          KEYSTORE_PATH: my-upload-key.jks
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        if: ${{ env.RELEASE_KEYSTORE_BASE64 != '' }}
        run: gradle :app:assembleRelease

      - name: Upload Release APK Artifact
        uses: actions/upload-artifact@v4.6.2  # ✅ Node 24 compatible
        with:
          name: alarmgrup-release-apk
          path: |
            app/build/outputs/apk/release/*.apk
          if-no-files-found: warn

      - name: Create GitHub Release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/heads/main-'))
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="v5.2.${{ github.run_number }}"
          RELEASE_TITLE="Release v5.2.${{ github.run_number }}"
          
          # Collect only release APKs
          FILES_TO_UPLOAD=()
          for f in app/build/outputs/apk/release/*.apk; do
            if [ -f "$f" ]; then
              FILES_TO_UPLOAD+=("$f")
            fi
          done

          if [ ${#FILES_TO_UPLOAD[@]} -eq 0 ]; then
            echo "❌ Error: Release failed. No APK files found in output directories."
            exit 1
          fi

          echo "🚀 Found APK files to upload: ${FILES_TO_UPLOAD[*]}"

          gh release create "$TAG_NAME" \
            "${FILES_TO_UPLOAD[@]}" \
            --title "$RELEASE_TITLE" \
            --notes "Automated release v5.2.${{ github.run_number }} (build: ${{ github.run_number }}). Commit: ${{ github.sha }}." \
            --target ${{ github.sha }}
